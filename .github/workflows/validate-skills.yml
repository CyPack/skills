name: Validate Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Skills
        shell: bash
        run: bash scripts/validate-all-skills.sh
